
server:
  port: 0

spring:
  application:
    name: microservice-auth
  datasource:
    url: ${AUTH_DB_URL}
    username: ${AUTH_DB_USER}
    password: ${AUTH_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.uuid}

  client:
    service-url:
      defaultZone: http://microservice-eureka:8761/eureka
    fetch-registry: true
    register-with-eureka: true
